<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web FNAF Prototype</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            width: 800px;
            height: 600px;
            background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
            position: relative;
            border: 2px solid #333;
            box-shadow: 0 0 20px #000;
            overflow: hidden;
        }

        /* --- UI Elements --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #power-stats {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
        }

        #usage-meter {
            color: #0f0;
        }

        /* --- Office & Hallways --- */
        .hallway {
            position: absolute;
            top: 100px;
            width: 150px;
            height: 400px;
            background-color: #050505;
            border: 5px solid #222;
        }

        #hall-left { left: 50px; }
        #hall-right { right: 50px; }

        /* --- Doors --- */
        .door {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                #333,
                #333 20px,
                #222 20px,
                #222 40px
            );
            transform: translateY(-100%);
            transition: transform 0.3s ease-in;
            border-bottom: 5px solid #555;
        }

        .door.closed {
            transform: translateY(0);
        }

        /* --- Controls --- */
        .control-panel {
            position: absolute;
            top: 250px;
            width: 40px;
            pointer-events: auto;
        }

        #controls-left { left: 5px; }
        #controls-right { right: 5px; }

        .btn {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            background-color: #500;
            border: 2px solid #222;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
        }

        .btn.active {
            background-color: #0d0;
        }

        /* --- Cameras --- */
        #camera-toggle {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #fff;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.2s;
        }

        #camera-toggle:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        #camera-system {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 20, 0, 0.9);
            z-index: 50;
            display: none;
            background-image: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 0, 0.1) 2px,
                rgba(0, 255, 0, 0.1) 4px
            );
        }

        #camera-system.active {
            display: block;
        }

        #cam-feed {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 500px;
            height: 400px;
            border: 2px solid #fff;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        /* --- Animatronic / Jumpscare --- */
        .animatronic {
            position: absolute;
            bottom: 0;
            left: 25px;
            width: 100px;
            height: 200px;
            background-color: #511;
            border-radius: 50px 50px 0 0;
            display: none;
        }

        #jumpscare {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #jumpscare h1 {
            color: red;
            font-size: 72px;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(5px, 5px) rotate(0deg); }
            10% { transform: translate(-5px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hall-left" class="hallway">
        <div id="animatronic-left" class="animatronic"></div>
        <div id="door-l" class="door"></div>
    </div>
    
    <div id="hall-right" class="hallway">
        <div id="animatronic-right" class="animatronic"></div>
        <div id="door-r" class="door"></div>
    </div>

    <div id="ui-layer">
        <div id="power-stats">
            Power: <span id="power-level">100</span>%<br>
            Usage: <span id="usage-meter">■</span>
        </div>

        <div id="controls-left" class="control-panel">
            <button id="btn-door-l" class="btn" onclick="toggleDoor('l')">DOOR</button>
            <button id="btn-light-l" class="btn" onclick="toggleLight('l')">LIGHT</button>
        </div>

        <div id="controls-right" class="control-panel">
            <button id="btn-door-r" class="btn" onclick="toggleDoor('r')">DOOR</button>
            <button id="btn-light-r" class="btn" onclick="toggleLight('r')">LIGHT</button>
        </div>

        <button id="camera-toggle" onclick="toggleCameras()">Toggle Monitor</button>
    </div>

    <div id="camera-system">
        <div id="cam-feed">CAM 1A - Show Stage (Animatronic is here)</div>
    </div>

    <div id="jumpscare">
        <h1>JUMPSCARE!</h1>
        <p style="color:white; font-size: 24px;">Game Over - Refresh to restart</p>
    </div>
</div>

<script>
    // Game State variables
    let power = 100;
    let powerUsage = 1;
    let isGameOver = false;
    let camsUp = false;

    // Devices state
    const state = {
        doorL: false,
        doorR: false,
        lightL: false,
        lightR: false
    };

    // Animatronic AI state (0: Stage, 1: Moving, 2: Left Door, 3: Right Door)
    let animatronicLocation = 0; 
    let animatronicPatience = 10; // Seconds before jumpscare if at door and open

    // --- Core Systems ---

    function updateUsage() {
        if (isGameOver) return;
        powerUsage = 1; // Base usage
        if (state.doorL) powerUsage++;
        if (state.doorR) powerUsage++;
        if (state.lightL) powerUsage++;
        if (state.lightR) powerUsage++;
        if (camsUp) powerUsage++;

        let meter = "";
        for(let i=0; i<powerUsage; i++) meter += "■ ";
        document.getElementById('usage-meter').innerText = meter;
        
        // Color coding the usage meter
        const meterEl = document.getElementById('usage-meter');
        if (powerUsage <= 2) meterEl.style.color = "#0f0"; // Green
        else if (powerUsage <= 4) meterEl.style.color = "#ff0"; // Yellow
        else meterEl.style.color = "#f00"; // Red
    }

    // Power Drain Loop
    setInterval(() => {
        if (isGameOver) return;
        power -= (powerUsage * 0.15); // Adjust drain speed here
        if (power <= 0) {
            power = 0;
            triggerPowerOutage();
        }
        document.getElementById('power-level').innerText = Math.floor(power);
    }, 1000);

    // --- Controls ---

    function toggleDoor(side) {
        if (power <= 0 || isGameOver) return;
        const isLeft = side === 'l';
        state[isLeft ? 'doorL' : 'doorR'] = !state[isLeft ? 'doorL' : 'doorR'];
        
        const doorEl = document.getElementById(isLeft ? 'door-l' : 'door-r');
        const btnEl = document.getElementById(isLeft ? 'btn-door-l' : 'btn-door-r');
        
        if (state[isLeft ? 'doorL' : 'doorR']) {
            doorEl.classList.add('closed');
            btnEl.classList.add('active');
        } else {
            doorEl.classList.remove('closed');
            btnEl.classList.remove('active');
        }
        updateUsage();
    }

    function toggleLight(side) {
        if (power <= 0 || isGameOver) return;
        const isLeft = side === 'l';
        
        // Cannot have both lights on at once in classic FNAF
        if (isLeft && state.lightR) toggleLight('r');
        if (!isLeft && state.lightL) toggleLight('l');

        state[isLeft ? 'lightL' : 'lightR'] = !state[isLeft ? 'lightL' : 'lightR'];
        
        const hallEl = document.getElementById(isLeft ? 'hall-left' : 'hall-right');
        const btnEl = document.getElementById(isLeft ? 'btn-light-l' : 'btn-light-r');
        
        if (state[isLeft ? 'lightL' : 'lightR']) {
            hallEl.style.backgroundColor = '#ccc';
            btnEl.classList.add('active');
            checkDoorway(side);
        } else {
            hallEl.style.backgroundColor = '#050505';
            btnEl.classList.remove('active');
            document.getElementById(isLeft ? 'animatronic-left' : 'animatronic-right').style.display = 'none';
        }
        updateUsage();
    }

    function toggleCameras() {
        if (power <= 0 || isGameOver) return;
        camsUp = !camsUp;
        const camSystem = document.getElementById('camera-system');
        
        if (camsUp) {
            camSystem.classList.add('active');
            // Turn off lights when cams go up
            if (state.lightL) toggleLight('l');
            if (state.lightR) toggleLight('r');
            updateCameraFeed();
        } else {
            camSystem.classList.remove('active');
        }
        updateUsage();
    }

    // --- Animatronic AI ---

    // Move AI every 5 seconds
    setInterval(() => {
        if (isGameOver || power <= 0) return;
        
        const r = Math.random();
        if (animatronicLocation === 0) {
            if (r > 0.5) animatronicLocation = 1; // Leaves stage
        } else if (animatronicLocation === 1) {
            // Pick a door
            animatronicLocation = (r > 0.5) ? 2 : 3; 
            animatronicPatience = 10; // Reset patience when arriving
        } else {
            // It's at a door.
            animatronicPatience--;
            
            // If patience runs out
            if (animatronicPatience <= 0) {
                if (animatronicLocation === 2 && !state.doorL) triggerJumpscare();
                else if (animatronicLocation === 3 && !state.doorR) triggerJumpscare();
                else {
                    // Door was closed, it gives up and goes back
                    animatronicLocation = 1; 
                    // Hide if light is on
                    document.getElementById('animatronic-left').style.display = 'none';
                    document.getElementById('animatronic-right').style.display = 'none';
                }
            }
        }
        
        if (camsUp) updateCameraFeed();
    }, 1000);

    function checkDoorway(side) {
        if (side === 'l' && animatronicLocation === 2) {
            document.getElementById('animatronic-left').style.display = 'block';
        }
        if (side === 'r' && animatronicLocation === 3) {
            document.getElementById('animatronic-right').style.display = 'block';
        }
    }

    function updateCameraFeed() {
        const feed = document.getElementById('cam-feed');
        if (animatronicLocation === 0) feed.innerText = "CAM 1A - Show Stage (Animatronic is here)";
        else if (animatronicLocation === 1) feed.innerText = "CAM 1B - Dining Area (Animatronic spotted)";
        else feed.innerText = "CAM 1A - Show Stage (Empty)";
    }

    // --- Game Over Scenarios ---

    function triggerPowerOutage() {
        if (isGameOver) return;
        // Turn everything off
        if (state.doorL) toggleDoor('l');
        if (state.doorR) toggleDoor('r');
        if (state.lightL) toggleLight('l');
        if (state.lightR) toggleLight('r');
        if (camsUp) toggleCameras();
        
        document.getElementById('game-container').style.background = '#000';
        document.getElementById('ui-layer').style.display = 'none';
        
        // Delay before jump
        setTimeout(triggerJumpscare, 5000 + Math.random() * 5000);
    }

    function triggerJumpscare() {
        isGameOver = true;
        document.getElementById('jumpscare').style.display = 'flex';
        // Force cams down
        document.getElementById('camera-system').classList.remove('active');
    }

</script>
</body>
</html>
